name: TaijiCore Test & Quality Assurance

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  schedule:
    # 每天 UTC 时间 02:00 运行测试（中国时间 10:00）
    - cron: '0 2 * * *'

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ ubuntu-latest, windows-latest ]
        python-version: [ '3.9', '3.10', '3.11' ]
        exclude:
          # Windows 上仅测试 3.10 和 3.11（加快CI）
          - os: windows-latest
            python-version: '3.9'

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install -r requirements-optional.txt
        pip install pytest pytest-cov pylint black isort

    - name: Lint with pylint
      continue-on-error: true
      run: |
        pylint taiji/ api/ --disable=all --enable=E,F --fail-under=9.0 || true

    - name: Format check with black
      continue-on-error: true
      run: |
        black --check taiji/ api/ tests/ || true

    - name: Import sort check with isort
      continue-on-error: true
      run: |
        isort --check-only taiji/ api/ tests/ || true

    - name: Run unit tests
      run: |
        pytest tests/ -v --tb=short --cov=taiji --cov=api --cov-report=xml --cov-report=term

    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v3
      with:
        file: ./coverage.xml
        flags: unittests
        name: codecov-umbrella
        fail_ci_if_error: false

    - name: Test API endpoints
      continue-on-error: true
      run: |
        python -m pytest tests/test_api_integration.py -v || true

    - name: Test TaijiCore compatibility
      continue-on-error: true
      run: |
        python -m pytest tests/test_tokenizer_real.py -v || true

  security:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install bandit safety

    - name: Run security scan with bandit
      continue-on-error: true
      run: |
        bandit -r taiji/ api/ -f json -o bandit-report.json || true

    - name: Check dependencies with safety
      continue-on-error: true
      run: |
        safety check --json || true

  build:
    runs-on: ubuntu-latest
    needs: [ test, security ]
    if: success()

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install build tools
      run: |
        python -m pip install --upgrade pip
        pip install build wheel setuptools

    - name: Build distribution
      run: |
        python -m build

    - name: Upload artifacts
      uses: actions/upload-artifact@v3
      with:
        name: distribution-packages
        path: dist/

  # 可选：发布到 PyPI（仅main分支）
  publish:
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' && success()
    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Download artifacts
      uses: actions/download-artifact@v3
      with:
        name: distribution-packages
        path: dist/

    - name: Publish to PyPI
      uses: pypa/gh-action-pypi-publish@release/v1
      with:
        password: ${{ secrets.PYPI_API_TOKEN }}
      continue-on-error: true