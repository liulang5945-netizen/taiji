<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" fill="none">
  <defs>
    <filter id="ink" x="-5%" y="-5%" width="110%" height="110%">
      <feTurbulence type="fractalNoise" baseFrequency="0.04" numOctaves="4" seed="5" result="noise"/>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="1.5"/>
    </filter>
  </defs>

  <!-- 外环 -->
  <circle cx="64" cy="64" r="60" stroke="#1a1a1a" stroke-width="2" fill="none" opacity="0.15" filter="url(#ink)"/>
  <circle cx="64" cy="64" r="56" stroke="#1a1a1a" stroke-width="0.5" fill="none" opacity="0.08"/>

  <!-- 阳 (白色) -->
  <path d="M64 4 A60 60 0 0 1 64 124 A30 30 0 0 1 64 64 A30 30 0 0 0 64 4 Z" fill="#f5f5f0" opacity="0.9"/>
  
  <!-- 阴 (黑色) -->
  <path d="M64 124 A60 60 0 0 1 64 4 A30 30 0 0 1 64 64 A30 30 0 0 0 64 124 Z" fill="#1a1a1a" opacity="0.85"/>

  <!-- S曲线 -->
  <path d="M64 4 A60 60 0 0 1 64 124" stroke="#1a1a1a" stroke-width="2.5" fill="none" opacity="0.3" filter="url(#ink)"/>

  <!-- 阳眼 -->
  <circle cx="64" cy="34" r="8" fill="#1a1a1a" opacity="0.9"/>
  <circle cx="64" cy="34" r="4" fill="#f5f5f0" opacity="0.3"/>
  
  <!-- 阴眼 -->
  <circle cx="64" cy="94" r="8" fill="#f5f5f0" opacity="0.9"/>
  <circle cx="64" cy="94" r="4" fill="#1a1a1a" opacity="0.3"/>

  <!-- 中心点 -->
  <circle cx="64" cy="64" r="3" fill="#1a1a1a" opacity="0.5"/>

  <!-- 流动光环 -->
  <circle cx="64" cy="64" r="52" fill="none" stroke="#1a1a1a" stroke-width="3" stroke-dasharray="20 10 5 10" opacity="0.5"/>
  <circle cx="64" cy="64" r="48" fill="none" stroke="#4a4a4a" stroke-width="2" stroke-dasharray="15 8 3 8" opacity="0.3"/>
</svg>
